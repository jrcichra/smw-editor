name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglx-dev libgl1-mesa-dev libwayland-dev libx11-dev libfuse2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp target/${{ matrix.target }}/release/smw-editor.exe smw-editor-${{ matrix.target }}.exe

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: tar czf smw-editor-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release smw-editor

      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/smw-editor AppDir/usr/bin/

          mkdir -p AppDir/usr/share/applications
          printf '[Desktop Entry]\nName=SMW Editor\nExec=smw-editor\nType=Application\nCategories=Game;\nIcon=smw-editor\n' > AppDir/usr/share/applications/smw-editor.desktop

          cp AppDir/usr/share/applications/smw-editor.desktop AppDir/smw-editor.desktop

          # Generate a minimal 256x256 PNG icon (solid colour, no extra deps).
          python3 - <<'PYEOF'
          import struct, zlib
          def png_chunk(tag, data):
              c = zlib.crc32(tag + data) & 0xFFFFFFFF
              return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', c)
          w = h = 256
          sig = b'\x89PNG\r\n\x1a\n'
          ihdr = png_chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
          raw = b''
          for _ in range(h):
              raw += b'\x00' + b'\x22\x55\xaa' * w  # filter byte + RGB pixels
          idat = png_chunk(b'IDAT', zlib.compress(raw, 9))
          iend = png_chunk(b'IEND', b'')
          with open('AppDir/smw-editor.png', 'wb') as f:
              f.write(sig + ihdr + idat + iend)
          PYEOF

          printf '#!/bin/sh\nHERE="$(dirname "$(readlink -f "$0")")"\nexport LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"\nexec "${HERE}/usr/bin/smw-editor" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir smw-editor-${{ matrix.target }}.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smw-editor-${{ matrix.target }}
          path: |
            smw-editor-${{ matrix.target }}.exe
            smw-editor-${{ matrix.target }}.tar.gz
            smw-editor-${{ matrix.target }}.AppImage

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.tar.gz
            artifacts/**/*.AppImage
